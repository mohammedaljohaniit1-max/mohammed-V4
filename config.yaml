# ══════════════════════════════════════════════════════════════════════════════
# MOHAMMED v4 — Configuration File
# Copy this file and fill in your API keys before running.
# ══════════════════════════════════════════════════════════════════════════════

# ── API Keys ──────────────────────────────────────────────────────────────────
api_keys:
  github: ""           # GitHub PAT: https://github.com/settings/tokens
  shodan: ""           # Shodan API: https://account.shodan.io
  virustotal: ""       # VirusTotal API: https://www.virustotal.com/gui/my-apikey
  alienvault: ""       # AlienVault OTX: https://otx.alienvault.com/api
  securitytrails: ""   # SecurityTrails: https://securitytrails.com/app/account/credentials
  chaos: ""            # Chaos (ProjectDiscovery): https://chaos.projectdiscovery.io
  censys: ""           # Censys: https://search.censys.io/account/api

# ── Ollama — Local AI (No cloud, no data leaks) ──────────────────────────────
ollama:
  enabled: true
  endpoint: "http://127.0.0.1:11434"
  model: "gemma:2b"    # Lightweight Google model — fast responses
  temperature: 0.2
  timeout: 15          # seconds — AI triage fails open (assumes REAL) if exceeded

# ── AI confirmation policy (Zero-FP, FIX #7) ─────────────────────────────────
ai:
  # When true, an unconfirmed Critical finding is auto-downgraded to
  # "Unverified-Critical" Info if the one-time startup Ollama probe found the
  # model offline. Nothing is reported as AI-confirmed without a REAL verdict.
  require_confirmation_for_critical: true

# ── Zero-FP Filtering (FIX #1/#2) ────────────────────────────────────────────
filter:
  # Strip Cloudflare challenge tokens (__cf_chl_rt_tk, cf_clearance, …) and
  # analytics params (utm_*, fbclid, gclid, …) before any injection tool sees a
  # URL; CF-challenge URLs are NEVER sent to sqlmap/dalfox/ghauri (FP #1).
  strip_cloudflare_params: true
  # Enforce scope on JavaScript secret scanning so squarespace/cloudfront CDN
  # bundles are never mined for "secrets" (FP #2).
  enforce_scope_on_js: true

# ── Proxy & WAF Evasion ──────────────────────────────────────────────────────
proxy:
  header_spoofing: true
  user_agent_rotation: true
  adaptive_throttling: true
  # FIX #5 — Two-tier Burp routing. When true, high-volume discovery/fuzzing/
  # crawling/archive-mining phases (Tier 1) run DIRECT and never flood Burp;
  # only confirmed-evidence phases (Tier 2) are proxied through Burp.
  selective_routing: true

# ── Context Chain (Auto token propagation) ────────────────────────────────────
context_chain:
  enabled: true
  auto_extract_js: true
  auto_inject_headers: true

# ── Parameter Profiler (Intelligent parameter classification) ─────────────────
param_profiler:
  enabled: true
  min_priority: 1
